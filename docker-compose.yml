services:
  mihomo-ui:
    build: .
    container_name: mihomo-ui
    restart: unless-stopped
    network_mode: host
    pid: host
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - TZ=Asia/Shanghai
      - UI_ADDR=:8080
      - UI_PASSWORD=${UI_PASSWORD:-mihomo-ui}
      - MIHOMO_SECRET=${MIHOMO_SECRET:-mihomo}
    volumes:
      - ./data:/data/mihomo-ui
