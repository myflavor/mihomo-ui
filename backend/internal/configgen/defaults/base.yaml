# Runtime base only — proxies / groups / rules come from the active config.
# mode / log-level / tun.enable are owned by settings.yaml (panel overlay).

mixed-port: 7890
allow-lan: false
bind-address: 127.0.0.1

profile:
  store-selected: true
  store-fake-ip: true

tun:
  enable: false
  stack: system
  device: mihomo
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
    - tcp://any:53

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - tls://dns.alidns.com
    - tls://dot.pub
